<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>幻灯片1</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0f172a;color:#fff;font-family:"Microsoft Yahei",sans-serif;overflow:hidden;}
  .slide{width:100vw;height:100vh;display:none;align-items:center;justify-content:center;text-align:center;padding:60px;font-size:2.5vw;}
  .slide.active{display:flex;flex-direction:column;gap:20px;}
  h1{font-size:3vw;color:#38bdf8;}
  p{color:#cbd5e1;}
</style>
</head>
<body>
<div class="slide active">
  <h1>第一套 分享幻灯片</h1>
  <p>左右方向键翻页 · GitHub 私有安全分享</p>
</div>
<div class="slide">
  <h1>第二页</h1>
  <p>在这里写你的内容</p>
</div>
<div class="slide">
  <h1>第三页</h1>
  <p>可无限加页面</p>
</div>
<script>
const slides = document.querySelectorAll('.slide');
let cur = 0;
function show(n){
  slides[cur].classList.remove('active');
  cur = (n + slides.length) % slides.length;
  slides[cur].classList.add('active');
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') show(cur+1);
  if(e.key==='ArrowLeft') show(cur-1);
});
</script>
</body>
</html>
